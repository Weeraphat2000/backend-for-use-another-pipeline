# CI Pipeline using Reusable Workflow
# This workflow calls the reusable workflow from shared-workflows repository

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  # Call the reusable workflow from another repository
  ci-pipeline:
    # Format: {owner}/{repo}/.github/workflows/{filename}@{ref}
    # Replace YOUR_GITHUB_USERNAME with your actual GitHub username
    uses: weeraphat2000/shared-workflows/.github/workflows/nodejs-ci.yml@main
    with:
      node-version: '18'
      working-directory: '.'
      run-lint: true
      run-tests: true
      run-security-audit: true # 🔒 Check for vulnerabilities
      run-format-check: true # 🎨 Prettier check
      run-build: true # 🏗️ Build step
      matrix-test: false # 🧪 Set to true for Node 18, 20, 22 testing
      slack-notification: false # 📢 Set to true + add SLACK_WEBHOOK_URL secret
      text: 'นี่เป็นข้อความเพิ่มเติมที่ส่งไปยังขั้นตอนสรุปผลของ workflow'
    # Pass secrets to the reusable workflow if needed
    secrets: inherit
